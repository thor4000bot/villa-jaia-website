[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS always
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Prevent clickjacking — nobody can embed this site in an iframe
    X-Frame-Options = "DENY"

    # Prevent MIME sniffing attacks
    X-Content-Type-Options = "nosniff"

    # Referrer policy — don't leak full URLs to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Permissions policy — block access to camera, mic, location, etc.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"

    # Content Security Policy — whitelist exactly what's needed
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com https://www.recaptcha.net; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"

# Cache static assets aggressively, HTML never
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirects — www → non-www canonical
[[redirects]]
  from = "https://www.villamagnus.com/*"
  to = "https://villamagnus.com/:splat"
  status = 301
  force = true

# Block common attack paths
[[redirects]]
  from = "/wp-admin/*"
  to = "/404"
  status = 404

[[redirects]]
  from = "/wp-login.php"
  to = "/404"
  status = 404

[[redirects]]
  from = "/.env"
  to = "/404"
  status = 404

[[redirects]]
  from = "/.git/*"
  to = "/404"
  status = 404

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404"
  status = 404

[[redirects]]
  from = "/phpmyadmin/*"
  to = "/404"
  status = 404

[[redirects]]
  from = "/admin/*"
  to = "/404"
  status = 404
